<!DOCTYPE html>
<html>
<head>
<title>MICAH WEB X</title>

<style>

:root{
--neon:#009dff;
}

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
min-height:2000px;
background:#009dff;
transition:1s;
overflow-x:hidden;
}


#theme{
position:fixed;
inset:0;
background:#111;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:999;
}


button,input{
padding:14px;
border-radius:25px;
border:0;
margin:5px;
}


.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}


#logo{
font-size:70px;
cursor:pointer;
text-shadow:
0 0 10px var(--neon),
0 0 30px var(--neon),
0 0 60px var(--neon);
}


#logo span{
display:inline-block;
transition:.8s;
}


.break span:nth-child(odd){
transform:translate(-100px,-100px) rotate(180deg);
opacity:0;
}


.break span:nth-child(even){
transform:translate(100px,100px) rotate(-180deg);
opacity:0;
}


.search{
background:#ffffff33;
padding:20px;
border-radius:40px;
}


#duck{
display:none;
width:90%;
height:500px;
margin:30px auto;
border-radius:30px;
overflow:hidden;
background:white;
}


#duck iframe{
width:100%;
height:100%;
border:0;
}


#history{
background:#ffffff22;
margin:20px;
padding:20px;
border-radius:20px;
}


.card{
margin:100px auto;
max-width:600px;
padding:30px;
background:#ffffff33;
border-radius:30px;
opacity:0;
transform:translateY(60px);
transition:.8s;
}


.card.show{
opacity:1;
transform:translateY(0);
}


.card.hide{
opacity:0;
transform:translateY(-60px);
}


.robot{
font-size:80px;
animation:float 2s infinite;
}


@keyframes float{
50%{
transform:translateY(-15px);
}
}


.fall{
position:fixed;
top:-50px;
font-size:30px;
animation:drop 5s linear;
}


@keyframes drop{
to{
transform:translateY(110vh) rotate(360deg);
}
}

</style>
</head>


<body>


<div id="theme">

<h1>🎨 Choose Theme</h1>

<button onclick="setTheme('#009dff')">💙 Blue</button>
<button onclick="setTheme('#ff2d55')">❤️ Red</button>
<button onclick="setTheme('#ff8c00')">🧡 Orange</button>
<button onclick="setTheme('#ffd400')">💛 Yellow</button>
<button onclick="setTheme('#00c853')">💚 Green</button>
<button onclick="setTheme('#7b2cff')">💜 Purple</button>
<button onclick="setTheme('#ff4fc3')">🩷 Pink</button>

</div>



<section class="hero">


<h1 id="logo">

<span>M</span><span>I</span><span>C</span><span>A</span><span>H</span>
<br>
<span>W</span><span>E</span><span>B</span>

</h1>


<p>🌐 The futuristic web</p>


<div class="search">

<input id="search" placeholder="Search DuckDuckGo">

<button onclick="search()">🔎</button>

<button onclick="openDuck()">🌐</button>

<button onclick="surprise()">✨</button>

</div>


<button onclick="openTheme()">🎨 Change Color</button>


<div class="robot">🤖</div>


<p>Creator is online</p>


</section>



<div id="duck">

<iframe id="duckFrame"></iframe>

</div>



<div id="history"></div>



<div class="card">

<h2>📖 Scripture</h2>

<p>John 3:16 - For God so loved the world.</p>

</div>



<div class="card">

<h2>⭐ Amazing Website</h2>

<p>A futuristic experience made by Micah.</p>

</div>



<div class="card">

<h2>🛠️ Starter Guide</h2>

<p>Create and explore the future of the web.</p>

</div>



<script>


let history =
JSON.parse(localStorage.getItem("micahHistory")) || [];



function setTheme(color){

document.body.style.background=color;

document.documentElement.style.setProperty("--neon",color);

localStorage.setItem("theme",color);

document.getElementById("theme").style.display="none";

}


function openTheme(){

document.getElementById("theme").style.display="flex";

}



let saved=localStorage.getItem("theme");

if(saved){

setTheme(saved);

}



function search(){

let q=document.getElementById("search").value.trim();


if(!q)return;


history.unshift(q);

history=history.slice(0,8);


localStorage.setItem(
"micahHistory",
JSON.stringify(history)
);


showHistory();


document.getElementById("duck").style.display="block";

document.getElementById("duckFrame").src=
"https://duckduckgo.com/?q="+encodeURIComponent(q);

}



function openDuck(){

document.getElementById("duck").style.display="block";

document.getElementById("duckFrame").src=
"https://duckduckgo.com";

}



function showHistory(){

let h=document.getElementById("history");

h.innerHTML="🕘 Search History";


history.forEach(x=>{

h.innerHTML+="<p>🔎 "+x+"</p>";

});

}



function surprise(){

alert("🚀 Welcome to MICAH WEB X");

}



document.getElementById("logo").onclick=function(){

this.classList.toggle("break");

};



window.addEventListener("scroll",()=>{

document.querySelectorAll(".card").forEach(card=>{

let box=card.getBoundingClientRect();


if(box.top<innerHeight-100 && box.bottom>0){

card.classList.add("show");

card.classList.remove("hide");

}

else if(box.bottom<0){

card.classList.add("hide");

}

});

});



setInterval(()=>{

let e=document.createElement("div");

e.className="fall";

e.innerHTML=["✨","🚀","💎","🧊"][Math.floor(Math.random()*4)];

e.style.left=Math.random()*100+"%";

document.body.appendChild(e);


setTimeout(()=>e.remove(),5000);


},900);



showHistory();


</script>


</body>
</html>
